name: Vercel Deploy Landing

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: claude/airtable-hyper-agent-research-et2uba
      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Vercel CLI
        run: npm install -g vercel@latest
      - name: Deploy landing/ to Vercel (production)
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          cd landing
          echo "Deploying landing/ to Vercel..."
          URL=$(vercel deploy --prod --yes --token="$VERCEL_TOKEN")
          echo ""
          echo "=====VERCEL_DEPLOY_URL===== ${URL}"
