name: Railway Logs

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  logs:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout platform branch
        uses: actions/checkout@v4
        with:
          ref: claude/airtable-hyper-agent-research-et2uba
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: pip install requests

      - name: Fetch Railway logs
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: python3 scripts/railway_logs.py

      - name: Commit logs to repo
        if: always()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -f railway_logs.txt ]; then
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git config user.name "github-actions[bot]"
            git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}
            cp railway_logs.txt scripts/railway_logs_output.txt
            git add scripts/railway_logs_output.txt
            git diff --cached --quiet || git commit -m "chore: railway logs [skip ci]"
            git push origin claude/airtable-hyper-agent-research-et2uba
          fi
