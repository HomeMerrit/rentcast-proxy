name: Railway Deploy Code

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy-code:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout platform branch
        uses: actions/checkout@v4
        with:
          ref: claude/airtable-hyper-agent-research-et2uba
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Install Python dependencies
        run: pip install requests

      - name: Deploy code to Railway services
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          GITHUB_WORKSPACE: ${{ github.workspace }}
        run: python3 scripts/railway_deploy_code.py

      - name: Publish result to step summary
        if: always()
        run: |
          if [ -f railway_deploy_result.txt ]; then
            echo "## Railway Deploy Result" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            cat railway_deploy_result.txt >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi

      - name: Commit logs to repo
        if: always()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}
          [ -f railway_deploy_log.txt ] && cp railway_deploy_log.txt scripts/railway_deploy_log.txt || true
          [ -f railway_deploy_result.txt ] && cp railway_deploy_result.txt scripts/railway_deploy_result.txt || true
          git add scripts/railway_deploy_log.txt scripts/railway_deploy_result.txt 2>/dev/null || true
          git diff --cached --quiet || git commit -m "chore: railway deploy code logs [skip ci]"
          git push origin claude/airtable-hyper-agent-research-et2uba || true
