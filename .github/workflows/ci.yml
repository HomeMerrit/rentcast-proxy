name: CI

# The merge gate. Runs the backend tenancy / auth / rate-limit / budget suite
# against a real Postgres + Redis on every PR and on pushes to the platform
# branch, so an isolation, auth, or spend-cap regression can never reach the
# deployed backend unnoticed.

on:
  pull_request:
    paths:
      - "agent-platform/backend/**"
      - ".github/workflows/ci.yml"
  push:
    branches:
      - claude/airtable-hyper-agent-research-et2uba
    paths:
      - "agent-platform/backend/**"
      - ".github/workflows/ci.yml"

permissions:
  contents: read

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    defaults:
      run:
        working-directory: agent-platform/backend

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: agentos_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://test:test@localhost:5432/agentos_test
      REDIS_URL: redis://localhost:6379/0
      REQUIRE_AUTH: "true"
      ANTHROPIC_API_KEY: test-not-used

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: agent-platform/backend/requirements-ci.txt

      - name: Install CI dependencies
        run: pip install -r requirements-ci.txt

      - name: Run test suite
        run: pytest -v
