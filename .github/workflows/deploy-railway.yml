name: Deploy AgentOS to Railway

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout platform branch
        uses: actions/checkout@v4
        with:
          ref: claude/airtable-hyper-agent-research-et2uba
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Install Python dependencies
        run: pip install requests

      - name: Check token is set
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          if [ -z "$RAILWAY_TOKEN" ]; then
            echo "ERROR: RAILWAY_TOKEN secret is not set"
            exit 1
          fi
          echo "Token is set (length=${#RAILWAY_TOKEN})"

      - name: Deploy full stack to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_WORKSPACE: ${{ github.workspace }}
        run: python3 scripts/deploy_railway.py

      - name: Upload deployment info
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: railway-deployment-info
          path: railway_deployment.txt
          if-no-files-found: warn

      - name: Publish deployment info to step summary
        if: always()
        run: |
          if [ -f railway_deployment.txt ]; then
            echo "## Railway Deployment Info" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            cat railway_deployment.txt >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo ""
            echo "=== DEPLOYMENT INFO ==="
            cat railway_deployment.txt
            echo "======================"
          fi

      - name: Commit deployment info to repo
        if: always()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -f railway_deployment.txt ]; then
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git config user.name "github-actions[bot]"
            git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}
            cp railway_deployment.txt scripts/railway_deployment.txt
            git add scripts/railway_deployment.txt
            git diff --cached --quiet || git commit -m "chore: update railway deployment info [skip ci]"
            git push origin claude/airtable-hyper-agent-research-et2uba
          fi
