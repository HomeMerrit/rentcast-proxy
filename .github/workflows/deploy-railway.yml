name: Deploy AgentOS to Railway

on:
  workflow_dispatch:
    inputs:
      railway_token:
        description: 'Railway API token'
        required: true
        type: string

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout platform branch
        uses: actions/checkout@v4
        with:
          ref: claude/airtable-hyper-agent-research-et2uba

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Install Python dependencies
        run: pip install requests

      - name: Verify Railway auth
        env:
          RAILWAY_TOKEN: ${{ inputs.railway_token }}
        run: railway whoami

      - name: Deploy full stack to Railway
        env:
          RAILWAY_TOKEN: ${{ inputs.railway_token }}
          ANTHROPIC_API_KEY: 'SET_IN_RAILWAY_DASHBOARD'
          GITHUB_WORKSPACE: ${{ github.workspace }}
        run: python3 scripts/deploy_railway.py
