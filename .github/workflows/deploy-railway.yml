name: Deploy AgentOS to Railway

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout platform branch
        uses: actions/checkout@v4
        with:
          ref: claude/airtable-hyper-agent-research-et2uba

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Install Python dependencies
        run: pip install requests

      - name: Check token is set
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          if [ -z "$RAILWAY_TOKEN" ]; then
            echo "ERROR: RAILWAY_TOKEN secret is not set"
            exit 1
          fi
          echo "Token is set (length=${#RAILWAY_TOKEN})"

      - name: Deploy full stack to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_WORKSPACE: ${{ github.workspace }}
        run: python3 scripts/deploy_railway.py
